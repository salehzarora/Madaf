name: CI

# M7C — pre-merge gate. Runs the same harness a developer runs locally.
# SAFE BY DESIGN: no secrets, no hosted Supabase, no deploy. The app builds in
# MOCK mode with zero env, so nothing here needs credentials. The local
# Supabase db lint/advisors are intentionally NOT run in CI (they need Docker +
# the Supabase CLI) — run them locally before merging (see
# docs/deployment/STAGING_DEPLOYMENT_M7C.md).

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: lint · test · build · audit
    runs-on: ubuntu-latest
    # No `environment:` and no `secrets` — this job must never need credentials.
    env:
      # Force MOCK mode explicitly so the build never expects a backend.
      NEXT_PUBLIC_MADAF_DATA_MODE: mock
      # Fail the build on lint/type errors rather than warning.
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22.x — required by the @supabase packages in the lockfile
          # (engines: node >=22). Keep in sync with local dev.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check (no emit)
        run: npx tsc --noEmit

      - name: Test (public-link [M8E.2] + orders [M8F.1] + products [M8F.2] search/pagination)
        run: npm test

      # M8E.2 — exercise the deployment-safety build GATE against a representative
      # SYNTHETIC config matrix (no secrets/values, only shapes). Proves the
      # errors are consumed by a REAL command (nonzero exit), not an unused
      # report. `env -u` truly UNSETS a var (the job default is mock), so the
      # "missing mode" case is genuinely missing. Each expect_* verifies the
      # actual exit code and cannot accept an expected failure as success.
      - name: Deployment-safety gate — synthetic config matrix
        run: |
          set -u
          SB="NEXT_PUBLIC_SUPABASE_URL=https://abcdefghijklmnopqrst.supabase.co NEXT_PUBLIC_SUPABASE_ANON_KEY=x"
          expect_pass() { if eval "$1 npm run check:deploy-safety" >/dev/null 2>&1; then echo "PASS(ok): $2"; else echo "FAIL(expected ok): $2"; exit 1; fi; }
          expect_fail() { if eval "$1 npm run check:deploy-safety" >/dev/null 2>&1; then echo "FAIL(expected error): $2"; exit 1; else echo "PASS(errored): $2"; fi; }
          # ── must PASS ──
          expect_pass "env -u VERCEL -u VERCEL_ENV NEXT_PUBLIC_MADAF_DATA_MODE=mock" "local zero-config mock (no Vercel)"
          expect_pass "env -u VERCEL -u VERCEL_ENV NEXT_PUBLIC_MADAF_DATA_MODE=supabase NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:55321 NEXT_PUBLIC_SUPABASE_ANON_KEY=x" "local Supabase dev (no Vercel, local url)"
          expect_pass "VERCEL=1 NEXT_PUBLIC_MADAF_DATA_MODE=supabase $SB NEXT_PUBLIC_APP_URL=https://madaf-drab.vercel.app VERCEL_PROJECT_PRODUCTION_URL=madaf-drab.vercel.app VERCEL_URL=madaf-abc123.vercel.app" "Vercel hosted supabase (production alias)"
          expect_pass "VERCEL=1 NEXT_PUBLIC_MADAF_DATA_MODE=supabase $SB NEXT_PUBLIC_APP_URL=https://shop.madaf.example" "Vercel hosted supabase (custom domain)"
          # ── must FAIL ──
          expect_fail "VERCEL=1 env -u NEXT_PUBLIC_MADAF_DATA_MODE" "Vercel + missing data mode"
          expect_fail "VERCEL=1 NEXT_PUBLIC_MADAF_DATA_MODE=mock" "Vercel + mock data mode"
          expect_fail "VERCEL=1 NEXT_PUBLIC_MADAF_DATA_MODE=demo" "Vercel + invalid data mode"
          expect_fail "VERCEL=1 NEXT_PUBLIC_MADAF_DATA_MODE=supabase $SB" "Vercel + missing canonical URL"
          expect_fail "VERCEL=1 NEXT_PUBLIC_MADAF_DATA_MODE=supabase $SB NEXT_PUBLIC_APP_URL=https://madaf-drab.vercel.app VERCEL_URL=madaf-drab.vercel.app" "Vercel + preview/per-deploy host"
          expect_fail "VERCEL=1 NEXT_PUBLIC_MADAF_DATA_MODE=supabase $SB NEXT_PUBLIC_APP_URL=https://madaf-drab.vercel.app NEXT_PUBLIC_SITE_URL=https://other.example VERCEL_PROJECT_PRODUCTION_URL=madaf-drab.vercel.app" "conflicting APP/SITE"

      - name: Build (mock mode, zero backend env)
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate
